<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Page not found — Stackly Computer Accessories Store" />
    <meta name="theme-color" content="#2563eb" />
    <title>404 — Page Not Found | Stackly</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .page-404 {
        background:
          linear-gradient(135deg, rgba(15, 23, 42, 0.92) 0%, rgba(30, 41, 59, 0.88) 100%),
          url('https://images.unsplash.com/photo-1518770660439-4636190af475?w=1600&q=80') center/cover no-repeat;
      }
      .page-404__icon {
        font-size: 3.5rem;
        color: #38bdf8;
        margin-bottom: 1rem;
        animation: pulse-glow 2s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.05); }
      }
      .page-404__num {
        text-shadow: 0 0 60px rgba(56, 189, 248, 0.35);
      }
      .page-404__chip {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.9rem;
        border-radius: 9999px;
        background: rgba(37, 99, 235, 0.15);
        border: 1px solid rgba(56, 189, 248, 0.3);
        color: #38bdf8;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 1.25rem;
      }
    </style>
  </head>
  <body>

    <header class="navbar scrolled" id="navbar">
      <div class="container navbar__inner">
        <a href="index.html" class="logo-brand"
          ><img src="assets/logo.webp" alt="Stackly Logo" style="height: 36px; width: auto;" /></a
        >
        <div class="navbar__actions">
          <a href="index.html" class="btn btn-primary btn-sm"
            ><i class="fa-solid fa-house"></i> Go Home</a
          >
        </div>
      </div>
    </header>

    <div class="page-404">
      <div style="position: relative; z-index: 2; text-align: center">
        <div class="page-404__chip" data-reveal="fade-up">
          <i class="fa-solid fa-plug-circle-xmark"></i> Connection Lost
        </div>
        <div class="page-404__icon" data-reveal="fade-up" data-reveal-delay="50">
          <i class="fa-solid fa-microchip"></i>
        </div>
        <div class="page-404__num" data-reveal="scale">404</div>
        <h1 class="page-404__title" data-reveal="fade-up">
          Page Not Found
        </h1>
        <p class="page-404__desc" data-reveal="fade-up" data-reveal-delay="100">
          Looks like this page got disconnected from the network. The URL may be
          outdated, or the page hasn't been deployed yet. Head back to the store
          and keep building your setup.
        </p>
        <div
          class="d-flex gap-3 justify-content-center flex-wrap"
          data-reveal="fade-up"
          data-reveal-delay="200"
        >
          <a href="index.html" class="btn btn-primary btn-lg"
            ><i class="fa-solid fa-store"></i> Back to Store</a
          >
          <a href="store.html" class="btn btn-lg"
            style="
              background: rgba(255, 255, 255, 0.1);
              border: 1px solid rgba(255, 255, 255, 0.2);
              color: #fff;
              backdrop-filter: blur(8px);
            "
          >
            <i class="fa-solid fa-keyboard"></i> Browse Accessories
          </a>
          <a
            href="javascript:history.back()"
            class="btn btn-lg"
            style="
              background: rgba(255, 255, 255, 0.06);
              border: 1px solid rgba(255, 255, 255, 0.15);
              color: rgba(255,255,255,0.85);
              backdrop-filter: blur(8px);
            "
          >
            <i class="fa-solid fa-arrow-left"></i> Go Back
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const revealEls = document.querySelectorAll('[data-reveal]');
        const observer = new IntersectionObserver(
          (entries) =>
            entries.forEach((en) => {
              if (en.isIntersecting) {
                en.target.classList.add('revealed');
                observer.unobserve(en.target);
              }
            }),
          { threshold: 0.1 }
        );
        revealEls.forEach((el) => observer.observe(el));
        setTimeout(() => revealEls.forEach((el) => el.classList.add('revealed')), 100);
      });
    </script>
  </body>
</html>
